name: ublue latest

on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

# Explicitly grant the permissions the reusable build job needs, so they are
# passed down even when the repo/org default_workflow_permissions is read-only.
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: build
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - core-server
          - core-desktop
        image_variant:
          - main
          - nvidia
    with:
      image_name: ${{ matrix.image_name }}
      image_variant: ${{ matrix.image_variant }}
      image_version: latest
